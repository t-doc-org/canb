<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Complétion du carré - Explication guidée</title>

<style>
body {
    font-family: "Segoe UI";
    background: #eef2f7;
}

.container {
    max-width: 850px;
    margin: 30px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
}

.box {
    background: #f4f7ff;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 15px;
}

.formula {
    text-align: center;
    font-size: 22px;
    margin-top: 10px;
}

input {
    width: 60px;
    text-align: center;
    margin: 0 5px;
}

select {
    padding: 4px;
    border-radius: 5px;
}

button {
    padding: 10px 16px;
    background: #3498db;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    display:block;
    margin:15px auto;
}

.step {
    display:none;
}
</style>
</head>

<body>

<div class="container">

<h2>Comprendre la complétion du carré</h2>

<!-- CHOIX -->
<div class="box">
<p>Choisis une fonction :</p>

<div class="formula">
f(x) =
<input id="aVal" value="1">x² 

<select id="opB">
<option value="+">+</option>
<option value="-">−</option>
</select>

<input id="bVal" value="4">x 

<select id="opC">
<option value="+">+</option>
<option value="-">−</option>
</select>

<input id="cVal" value="5">
</div>

<button onclick="start()">Commencer</button>
</div>

<!-- ETAPES -->
<div id="steps">
<div class="box step" id="s1"></div>
<div class="box step" id="s2"></div>
<div class="box step" id="s3"></div>
<div class="box step" id="s4"></div>
<div class="box step" id="s5"></div>
</div>

<button id="nextBtn" style="display:none" onclick="nextStep()">Suivant</button>

</div>

<script>

let a,b,c,add,h,k;
let currentStep=0;

/* ===== START ===== */
function start(){

    a = parseFloat(aVal.value);

    let bInput = parseFloat(bVal.value);
    let cInput = parseFloat(cVal.value);

    let signB = document.getElementById("opB").value;
    let signC = document.getElementById("opC").value;

    b = signB === "+" ? bInput : -bInput;
    c = signC === "+" ? cInput : -cInput;

    if(a !== 1){
        alert("Pour l'instant, a doit être égal à 1.");
        return;
    }

    add = (b/2)*(b/2);
    h = b/2;
    k = c - add;

    currentStep = 0;

    document.querySelectorAll(".step").forEach(el=>{
        el.style.display="none";
        el.innerHTML="";
    });

    nextBtn.style.display="block";

    nextStep();
}

/* ===== ETAPES ===== */
function nextStep(){

    currentStep++;

    if(currentStep===1){
        s1.style.display="block";
        s1.innerHTML = `
        <p>On part de :</p>
        <div class="formula">
        f(x) = x² ${sign(b)} ${Math.abs(b)}x ${sign(c)} ${Math.abs(c)}
        </div>
        `;
    }

    if(currentStep===2){
        s2.style.display="block";
        s2.innerHTML = `
        <p>On ajoute et retranche pour créer un carré parfait :</p>
        <div class="formula">
        x² ${sign(b)} ${Math.abs(b)}x + ${add} − ${add} ${sign(c)} ${Math.abs(c)}
        </div>
        `;
    }

    if(currentStep===3){
        s3.style.display="block";
        s3.innerHTML = `
        <p>On isole les termes du carré parfait :</p>
        <div class="formula">
        x² ${sign(b)} ${Math.abs(b)}x + ${add}
        </div>
        `;
    }

    if(currentStep===4){
        s4.style.display="block";
        s4.innerHTML = `
        <p>C'est un carré parfait :</p>
        <div class="formula">
        (x ${sign(h)} ${Math.abs(h)})²
        </div>
        `;
    }

    if(currentStep===5){
        s5.style.display="block";
        s5.innerHTML = `
        <p>On remet tout et on simplifie :</p>
        <div class="formula">
        f(x) =  (x ${sign(h)} ${Math.abs(h)})² - ${add} ${sign(c)} ${Math.abs(c)} = (x ${sign(h)} ${Math.abs(h)})² ${sign(k)} ${Math.abs(k)}
        </div>
        <p style="text-align:center">🎉 Forme canonique obtenue !</p>
        `;
        nextBtn.style.display="none";
    }
}

/* ===== SIGNES ===== */
function sign(x){
    return x >= 0 ? "+" : "-";
}

</script>

</body>
</html>
